name: CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macOS
          - os: windows-latest
            platform: Windows
          - os: ubuntu-latest
            platform: Linux

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            ladspa-sdk \
            libasound2-dev \
            libfreetype6-dev \
            libjack-jackd2-dev \
            libcurl4-openssl-dev \
            libglu1-mesa-dev \
            libgtk-3-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            mesa-common-dev \
            pkg-config

      - name: Configure vcpkg
        shell: pwsh
        run: |
          $roots = @(
            $env:VCPKG_ROOT,
            $env:VCPKG_INSTALLATION_ROOT,
            '/usr/local/share/vcpkg',
            'C:\vcpkg'
          )
          if ($env:HOME) {
            $roots += Join-Path $env:HOME 'vcpkg'
          }

          $vcpkgRoot = $null
          foreach ($root in $roots) {
            if (-not $root) {
              continue
            }

            $candidateToolchain = Join-Path $root 'scripts/buildsystems/vcpkg.cmake'
            if (Test-Path $candidateToolchain) {
              $vcpkgRoot = $root
              break
            }
          }

          if (-not $vcpkgRoot) {
            throw 'No vcpkg toolchain file was found on this runner.'
          }

          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Configure Release
        run: cmake --preset release

      - name: Build Release
        run: cmake --build --preset release

      - name: Test Release
        run: ctest --preset release --output-on-failure

      - name: Package plugin formats
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $artifactRoot = Join-Path $env:GITHUB_WORKSPACE 'build/release/CaveyPlugin_artefacts/Release'
          $dist = Join-Path $env:GITHUB_WORKSPACE 'dist'
          New-Item -ItemType Directory -Force -Path $dist | Out-Null

          function New-PluginZip {
            param(
              [Parameter(Mandatory = $true)][string] $Format,
              [Parameter(Mandatory = $true)][string] $PluginName,
              [Parameter(Mandatory = $true)][string] $ZipName
            )

            $pluginPath = Join-Path $artifactRoot (Join-Path $Format $PluginName)
            if (-not (Test-Path $pluginPath)) {
              throw "Expected plugin output was not found: $pluginPath"
            }

            $zipPath = Join-Path $dist $ZipName
            if (Test-Path $zipPath) {
              Remove-Item -Force $zipPath
            }

            Push-Location (Split-Path -Parent $pluginPath)
            try {
              cmake -E tar cf $zipPath --format=zip $PluginName
              if ($LASTEXITCODE -ne 0) {
                throw "Failed to create $zipPath"
              }
            } finally {
              Pop-Location
            }
          }

          if ('${{ matrix.platform }}' -eq 'macOS') {
            New-PluginZip -Format 'AU' -PluginName 'Cavey.component' -ZipName 'Cavey-AU-macOS.zip'
          }

          New-PluginZip -Format 'VST3' -PluginName 'Cavey.vst3' -ZipName 'Cavey-VST3-${{ matrix.platform }}.zip'

          Get-ChildItem -File $dist

      - name: Upload AU artifact
        if: matrix.platform == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Cavey-AU-macOS.zip
          path: dist/Cavey-AU-macOS.zip
          if-no-files-found: error

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cavey-VST3-${{ matrix.platform }}.zip
          path: dist/Cavey-VST3-${{ matrix.platform }}.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download plugin artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY"; then
            gh release upload "$TAG_NAME" release-assets/*.zip --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG_NAME" release-assets/*.zip --repo "$GITHUB_REPOSITORY" --title "$TAG_NAME" --generate-notes
          fi
